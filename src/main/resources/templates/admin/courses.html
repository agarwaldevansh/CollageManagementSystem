<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Courses – EduManage</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i data-lucide="graduation-cap"></i></div>
      <div class="brand-text"><h3>CollegeMS</h3><span>Admin Portal</span></div>
    </div>
    <nav class="sidebar-nav">
      <a th:href="@{/admin/dashboard}" class="nav-item"><span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>Dashboard</a>
      <a th:href="@{/admin/students}" class="nav-item"><span class="nav-icon"><i data-lucide="users"></i></span>Students</a>
      <a th:href="@{/admin/faculty}" class="nav-item"><span class="nav-icon"><i data-lucide="user-check"></i></span>Faculty</a>
      <a th:href="@{/admin/departments}" class="nav-item"><span class="nav-icon"><i data-lucide="building-2"></i></span>Departments</a>
      <a th:href="@{/admin/courses}" class="nav-item active"><span class="nav-icon"><i data-lucide="book-open"></i></span>Courses</a>
      <a th:href="@{/admin/subjects}" class="nav-item"><span class="nav-icon"><i data-lucide="file-text"></i></span>Subjects</a>
      <a th:href="@{/admin/attendance}" class="nav-item"><span class="nav-icon"><i data-lucide="calendar-check"></i></span>Attendance</a>
      <a th:href="@{/admin/results}" class="nav-item"><span class="nav-icon"><i data-lucide="bar-chart-2"></i></span>Results</a>
      <a th:href="@{/admin/fees}" class="nav-item"><span class="nav-icon"><i data-lucide="credit-card"></i></span>Fees</a>
      <a th:href="@{/admin/faculty-mapping}" class="nav-item"><span class="nav-icon"><i data-lucide="network"></i></span>Faculty Mapping</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">A</div>
        <div class="sidebar-user-info"><div class="user-name">Administrator</div><div class="user-role">System Admin</div></div>
      </div>
      <a th:href="@{/logout}" class="nav-item logout"><span class="nav-icon"><i data-lucide="log-out"></i></span>Logout</a>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-hamburger" id="hamburger"><i data-lucide="menu"></i></button>
        <div class="topbar-breadcrumb"><span class="page-title">Courses</span></div>
      </div>
      <div class="topbar-right">
        <a th:href="@{/logout}" class="topbar-icon-btn"><i data-lucide="user"></i></a>
      </div>
    </header>
    <main class="page-content">
      <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
      <div class="alert alert-danger"  th:if="${error}"   th:text="${error}"></div>
      <div class="table-card">
        <div class="table-header"><h3>Courses</h3>
          <button class="btn btn-primary btn-sm" onclick="openModal('addModal')"><i data-lucide="plus" style="width:13px;height:13px;"></i> Add</button>
        </div>
        <div class="table-wrapper"><table>
          <thead><tr><th>#</th><th>Course</th><th>Duration</th><th>Department</th><th>Action</th></tr></thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(courses)}"><td colspan="5" style="text-align:center;padding:32px;color:var(--slate-400);">No courses yet.</td></tr>
            <tr th:each="c, iter : ${courses}">
              <td style="color:var(--slate-400);" th:text="${iter.count}"></td>
              <td><strong th:text="${c.courseName}"></strong></td>
              <td th:text="${c.duration ?: '—'}"></td>
              <td th:text="${c.department?.departmentName ?: '—'}"></td>
              <td>
                <form th:action="@{/admin/courses/delete/{id}(id=${c.courseId})}" method="post" style="display:inline;" onsubmit="return confirm('Delete?')">
                  <button type="submit" class="btn btn-danger btn-sm"><i data-lucide="trash-2" style="width:13px;height:13px;"></i></button>
                </form>
              </td>
            </tr>
          </tbody>
        </table></div>
      </div>
      <div class="modal-overlay" id="addModal">
        <div class="modal-box">
          <div class="modal-header"><h3>Add Course</h3><button class="modal-close" onclick="closeModal('addModal')">✕</button></div>
          <form th:action="@{/admin/courses/add}" method="post">
            <div class="form-group"><label>Course Name *</label><input type="text" name="courseName" class="form-control" required/></div>
            <div class="form-group"><label>Duration</label><input type="text" name="duration" class="form-control" placeholder="e.g. 4 Years"/></div>
            <div class="form-group"><label>Department *</label>
              <select name="departmentId" class="form-select" required>
                <option value="">-- Select --</option>
                <option th:each="d : ${departments}" th:value="${d.departmentId}" th:text="${d.departmentName}"></option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Save Course</button>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>
<script>
  lucide.createIcons();
  const _s=document.getElementById('sidebar'),_h=document.getElementById('hamburger');
  _h?.addEventListener('click',()=>_s.classList.toggle('open'));
  document.addEventListener('click',e=>{if(!_s.contains(e.target)&&!_h?.contains(e.target))_s.classList.remove('open');});
  
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
window.onclick = e => { if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open'); };

</script>
</body>
</html>
