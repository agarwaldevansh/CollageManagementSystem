<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance Report – EduManage</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-icon"><i data-lucide="graduation-cap"></i></div><div class="brand-text"><h3>CollegeMS</h3><span>Admin Portal</span></div></div>
    <nav class="sidebar-nav">
      <a th:href="@{/admin/dashboard}" class="nav-item"><span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>Dashboard</a>
      <a th:href="@{/admin/students}" class="nav-item"><span class="nav-icon"><i data-lucide="users"></i></span>Students</a>
      <a th:href="@{/admin/faculty}" class="nav-item"><span class="nav-icon"><i data-lucide="user-check"></i></span>Faculty</a>
      <a th:href="@{/admin/departments}" class="nav-item"><span class="nav-icon"><i data-lucide="building-2"></i></span>Departments</a>
      <a th:href="@{/admin/courses}" class="nav-item"><span class="nav-icon"><i data-lucide="book-open"></i></span>Courses</a>
      <a th:href="@{/admin/subjects}" class="nav-item"><span class="nav-icon"><i data-lucide="file-text"></i></span>Subjects</a>
      <a th:href="@{/admin/attendance}" class="nav-item active"><span class="nav-icon"><i data-lucide="calendar-check"></i></span>Attendance</a>
      <a th:href="@{/admin/results}" class="nav-item"><span class="nav-icon"><i data-lucide="bar-chart-2"></i></span>Results</a>
      <a th:href="@{/admin/fees}" class="nav-item"><span class="nav-icon"><i data-lucide="credit-card"></i></span>Fees</a>
      <a th:href="@{/admin/faculty-mapping}" class="nav-item"><span class="nav-icon"><i data-lucide="network"></i></span>Faculty Mapping</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="sidebar-avatar">A</div><div class="sidebar-user-info"><div class="user-name">Administrator</div><div class="user-role">System Admin</div></div></div>
      <a th:href="@{/logout}" class="nav-item logout"><span class="nav-icon"><i data-lucide="log-out"></i></span>Logout</a>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-hamburger" id="hamburger"><i data-lucide="menu"></i></button>
        <div class="topbar-breadcrumb"><span class="page-title">Attendance Report</span></div>
      </div>
      <div class="topbar-right"><a th:href="@{/logout}" class="topbar-icon-btn"><i data-lucide="user"></i></a></div>
    </header>
    <main class="page-content">
      <div class="table-card">
        <div class="table-header"><h3>All Attendance Records</h3>
          <span class="badge badge-slate" th:text="${#lists.size(attendanceList)}+' records'"></span>
        </div>
        <div class="table-wrapper"><table>
          <thead><tr><th>#</th><th>Student</th><th>Reg. No.</th><th>Subject</th><th>Date</th><th>Status</th><th>Remarks</th></tr></thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(attendanceList)}">
              <td colspan="7" style="text-align:center;padding:32px;color:var(--slate-400);">No attendance records yet.</td>
            </tr>
            <tr th:each="a, iter : ${attendanceList}">
              <td style="color:var(--slate-400);" th:text="${iter.count}"></td>
              <td th:text="${a.student?.person?.name ?: '—'}"></td>
              <td><span class="badge badge-info" th:text="${a.student?.registrationNumber ?: '—'}"></span></td>
              <td th:text="${a.subject?.subjectName ?: '—'}"></td>
              <td th:text="${a.id?.date ?: '—'}"></td>
              <td><span class="badge" th:classappend="${a.status=='PRESENT'}?' badge-success':' badge-danger'" th:text="${a.status ?: '—'}"></span></td>
              <td style="color:var(--slate-500);" th:text="${a.remarks ?: '—'}"></td>
            </tr>
          </tbody>
        </table></div>
      </div>
    </main>
  </div>
</div>
<script>
  lucide.createIcons();
  const _s=document.getElementById('sidebar'),_h=document.getElementById('hamburger');
  _h?.addEventListener('click',()=>_s.classList.toggle('open'));
  document.addEventListener('click',e=>{if(!_s.contains(e.target)&&!_h?.contains(e.target))_s.classList.remove('open');});
  
</script>
</body>
</html>
