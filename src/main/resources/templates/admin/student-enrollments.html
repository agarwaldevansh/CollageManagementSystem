<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Enrollments – EduManage</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-icon"><i data-lucide="graduation-cap"></i></div><div class="brand-text"><h3>CollegeMS</h3><span>Admin Portal</span></div></div>
    <nav class="sidebar-nav">
      <a th:href="@{/admin/dashboard}" class="nav-item"><span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>Dashboard</a>
      <a th:href="@{/admin/students}" class="nav-item active"><span class="nav-icon"><i data-lucide="users"></i></span>Students</a>
      <a th:href="@{/admin/faculty}" class="nav-item"><span class="nav-icon"><i data-lucide="user-check"></i></span>Faculty</a>
      <a th:href="@{/admin/departments}" class="nav-item"><span class="nav-icon"><i data-lucide="building-2"></i></span>Departments</a>
      <a th:href="@{/admin/courses}" class="nav-item"><span class="nav-icon"><i data-lucide="book-open"></i></span>Courses</a>
      <a th:href="@{/admin/subjects}" class="nav-item"><span class="nav-icon"><i data-lucide="file-text"></i></span>Subjects</a>
      <a th:href="@{/admin/attendance}" class="nav-item"><span class="nav-icon"><i data-lucide="calendar-check"></i></span>Attendance</a>
      <a th:href="@{/admin/results}" class="nav-item"><span class="nav-icon"><i data-lucide="bar-chart-2"></i></span>Results</a>
      <a th:href="@{/admin/fees}" class="nav-item"><span class="nav-icon"><i data-lucide="credit-card"></i></span>Fees</a>
      <a th:href="@{/admin/faculty-mapping}" class="nav-item"><span class="nav-icon"><i data-lucide="network"></i></span>Faculty Mapping</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="sidebar-avatar">A</div><div class="sidebar-user-info"><div class="user-name">Administrator</div><div class="user-role">System Admin</div></div></div>
      <a th:href="@{/logout}" class="nav-item logout"><span class="nav-icon"><i data-lucide="log-out"></i></span>Logout</a>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-hamburger" id="hamburger"><i data-lucide="menu"></i></button>
        <div class="topbar-breadcrumb"><span class="page-title">Student Enrollments</span></div>
      </div>
      <div class="topbar-right"><a th:href="@{/logout}" class="topbar-icon-btn"><i data-lucide="user"></i></a></div>
    </header>
    <main class="page-content">
      <div style="margin-bottom:16px;">
        <a th:href="@{/admin/students}" class="btn btn-ghost btn-sm" style="gap:6px;">
          <i data-lucide="arrow-left" style="width:13px;height:13px;"></i> Back to Students
        </a>
      </div>
      <div class="table-card" style="padding:20px;margin-bottom:20px;max-width:520px;">
        <div style="display:flex;align-items:center;gap:14px;">
          <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--teal-500),var(--teal-700));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.25rem;font-weight:700;flex-shrink:0;"
               th:text="${student?.person?.name?.substring(0,1)?.toUpperCase() ?: 'S'}"></div>
          <div>
            <div style="font-weight:700;font-size:1rem;" th:text="${student?.person?.name}"></div>
            <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">
              <span class="badge badge-info" th:text="${student?.registrationNumber ?: '—'}"></span>
              <span class="badge badge-success" th:text="${course?.courseName ?: '—'}"></span>
              <span class="badge badge-primary" th:text="${student?.currentYear!=null}?'Year '+${student.currentYear}:''"></span>
            </div>
          </div>
        </div>
      </div>
      <div class="table-card">
        <div class="table-header"><h3>Enrolled Subjects</h3>
          <span class="badge badge-primary" th:text="${#lists.size(enrolledSubjects)}+' subject(s)'"></span>
        </div>
        <div class="table-wrapper"><table>
          <thead><tr><th>#</th><th>Subject</th><th>Type</th><th>Course</th><th>Faculty</th></tr></thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(enrolledSubjects)}">
              <td colspan="5" style="text-align:center;padding:24px;color:var(--slate-400);">No subjects enrolled yet.</td>
            </tr>
            <tr th:each="s, iter : ${enrolledSubjects}">
              <td style="color:var(--slate-400);" th:text="${iter.count}"></td>
              <td><strong th:text="${s.subjectName}"></strong></td>
              <td><span class="badge" th:classappend="${s.subjectType=='COMPULSORY'}?' badge-primary':' badge-warning'" th:text="${s.subjectType}"></span></td>
              <td th:text="${s.course?.courseName ?: '—'}"></td>
              <td th:text="${s.faculty?.person?.name ?: '—'}"></td>
            </tr>
          </tbody>
        </table></div>
      </div>
    </main>
  </div>
</div>
<script>
  lucide.createIcons();
  const _s=document.getElementById('sidebar'),_h=document.getElementById('hamburger');
  _h?.addEventListener('click',()=>_s.classList.toggle('open'));
  document.addEventListener('click',e=>{if(!_s.contains(e.target)&&!_h?.contains(e.target))_s.classList.remove('open');});
  
</script>
</body>
</html>
