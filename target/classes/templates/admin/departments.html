<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Departments – EduManage</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i data-lucide="graduation-cap"></i></div>
      <div class="brand-text"><h3>CollegeMS</h3><span>Admin Portal</span></div>
    </div>
    <nav class="sidebar-nav">
      <a th:href="@{/admin/dashboard}"      class="nav-item"><span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>Dashboard</a>
      <a th:href="@{/admin/students}"       class="nav-item"><span class="nav-icon"><i data-lucide="users"></i></span>Students</a>
      <a th:href="@{/admin/faculty}"        class="nav-item"><span class="nav-icon"><i data-lucide="user-check"></i></span>Faculty</a>
      <a th:href="@{/admin/departments}"    class="nav-item active"><span class="nav-icon"><i data-lucide="building-2"></i></span>Departments</a>
      <a th:href="@{/admin/courses}"        class="nav-item"><span class="nav-icon"><i data-lucide="book-open"></i></span>Courses</a>
      <a th:href="@{/admin/subjects}"       class="nav-item"><span class="nav-icon"><i data-lucide="file-text"></i></span>Subjects</a>
      <a th:href="@{/admin/attendance}"     class="nav-item"><span class="nav-icon"><i data-lucide="calendar-check"></i></span>Attendance</a>
      <a th:href="@{/admin/results}"        class="nav-item"><span class="nav-icon"><i data-lucide="bar-chart-2"></i></span>Results</a>
      <a th:href="@{/admin/fees}"           class="nav-item"><span class="nav-icon"><i data-lucide="credit-card"></i></span>Fees</a>
      <a th:href="@{/admin/faculty-mapping}"class="nav-item"><span class="nav-icon"><i data-lucide="network"></i></span>Faculty Mapping</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">A</div>
        <div class="sidebar-user-info"><div class="user-name">Administrator</div><div class="user-role">System Admin</div></div>
      </div>
      <a th:href="@{/logout}" class="nav-item logout"><span class="nav-icon"><i data-lucide="log-out"></i></span>Logout</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-hamburger" id="hamburger"><i data-lucide="menu"></i></button>
        <div class="topbar-breadcrumb"><span class="page-title">Departments</span></div>
      </div>
      <div class="topbar-right">
        <a th:href="@{/logout}" class="topbar-icon-btn"><i data-lucide="user"></i></a>
      </div>
    </header>

    <main class="page-content">
      <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
      <div class="alert alert-danger"  th:if="${error}"   th:text="${error}"></div>

      <div class="table-card">
        <div class="table-header">
          <h3>Departments</h3>
          <button class="btn btn-primary btn-sm" onclick="openModal('addModal')">
            <i data-lucide="plus" style="width:13px;height:13px;"></i> Add Department
          </button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>#</th><th>Department Name</th><th>Head of Department</th><th>Actions</th></tr>
            </thead>
            <tbody>
              <tr th:if="${#lists.isEmpty(departments)}">
                <td colspan="4" style="text-align:center;padding:32px;color:var(--slate-400);">No departments yet.</td>
              </tr>
              <tr th:each="d, iter : ${departments}">
                <td style="color:var(--slate-400);" th:text="${iter.count}"></td>
                <td><strong th:text="${d.departmentName}"></strong></td>
                <td th:text="${d.hod ?: '—'}"></td>
                <td style="display:flex;gap:6px;">
                  <!--
                    FIX: Thymeleaf blocks strings in th:onclick (security policy).
                    Solution: store data in data-* attributes (numbers + strings are safe),
                    then read them in a plain JS click handler — no th:onclick needed.
                  -->
                  <button class="btn btn-ghost btn-sm edit-dept-btn"
                          th:attr="data-id=${d.departmentId},
                                   data-name=${d.departmentName},
                                   data-hod=${d.hod ?: ''}">
                    <i data-lucide="pencil" style="width:13px;height:13px;"></i>
                  </button>
                  <form th:action="@{/admin/departments/delete/{id}(id=${d.departmentId})}"
                        method="post" style="display:inline;"
                        onsubmit="return confirm('Delete this department?')">
                    <button type="submit" class="btn btn-danger btn-sm">
                      <i data-lucide="trash-2" style="width:13px;height:13px;"></i>
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ADD MODAL -->
      <div class="modal-overlay" id="addModal">
        <div class="modal-box">
          <div class="modal-header">
            <h3>Add Department</h3>
            <button class="modal-close" onclick="closeModal('addModal')">✕</button>
          </div>
          <form th:action="@{/admin/departments/add}" method="post">
            <div class="form-group">
              <label>Department Name *</label>
              <input type="text" name="departmentName" class="form-control"
                     placeholder="e.g. Computer Science" required maxlength="100"/>
            </div>
            <div class="form-group">
              <label>Head of Department</label>
              <input type="text" name="hod" class="form-control"
                     placeholder="e.g. Dr. Sharma"/>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Save Department</button>
          </form>
        </div>
      </div>

      <!-- EDIT MODAL -->
      <div class="modal-overlay" id="editModal">
        <div class="modal-box">
          <div class="modal-header">
            <h3>Edit Department</h3>
            <button class="modal-close" onclick="closeModal('editModal')">✕</button>
          </div>
          <form id="editDeptForm" method="post">
            <div class="form-group">
              <label>Department Name *</label>
              <input type="text" name="departmentName" id="editDeptName"
                     class="form-control" required maxlength="100"/>
            </div>
            <div class="form-group">
              <label>Head of Department</label>
              <input type="text" name="hod" id="editDeptHod" class="form-control"/>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Update Department</button>
          </form>
        </div>
      </div>

    </main>
  </div>
</div>

<script>
  lucide.createIcons();

  /* Sidebar mobile toggle */
  const _s = document.getElementById('sidebar');
  const _h = document.getElementById('hamburger');
  _h?.addEventListener('click', () => _s.classList.toggle('open'));
  document.addEventListener('click', e => {
    if (!_s.contains(e.target) && !_h?.contains(e.target)) _s.classList.remove('open');
  });

  /* Modal helpers */
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  window.onclick = e => {
    if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
  };

  /*
   * FIX: Use event delegation on data-* attributes instead of th:onclick.
   * Thymeleaf 3.x refuses string variables in DOM event attributes (th:onclick).
   * Reading data-* attributes from the clicked button is the correct pattern.
   */
  document.addEventListener('click', e => {
    const btn = e.target.closest('.edit-dept-btn');
    if (!btn) return;

    const id   = btn.dataset.id;
    const name = btn.dataset.name;
    const hod  = btn.dataset.hod;

    document.getElementById('editDeptName').value = name || '';
    document.getElementById('editDeptHod').value  = hod  || '';
    document.getElementById('editDeptForm').action = '/admin/departments/update/' + id;
    openModal('editModal');
  });
</script>
</body>
</html>
